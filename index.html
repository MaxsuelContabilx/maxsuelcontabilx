<style>
        :root {
            --bg-main: #0a111e;        /* Azul Marinho Fundo Profundo */
            --bg-card: #131c2e;        /* Azul Marinho dos Cards */
            --text-white: #f8fafc;     /* Branco Suave */
            --text-gold: #c3a67d;      /* O dourado fosco elegante da sua logo */
            --brand-navy: #11222f;     /* O azul-marinho escuro da logo */
            --btn-bg: #1e293b;         
            --btn-hover: #1e3a8a;      
            --border-color: #24334d;   
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 750px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            color: var(--text-white);
            background-color: var(--bg-main);
        }

        /* CONFIGURAÇÃO DA LOGO IDÊNTICA AO ORIGINAL */
        .brand-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 1rem;
        }

        .brand-logo-container {
            display: inline-flex;
            align-items: flex-start;
            justify-content: center;
            font-family: "Arial Black", "Impact", sans-serif; /* Fonte mais robusta para o M */
            line-height: 0.85;
            margin-bottom: 1rem;
            position: relative;
        }

        .logo-m-left {
            font-size: 5rem;
            color: #12222e; /* O tom escuro exato da logo original */
        }

        .logo-m-right {
            font-size: 5rem;
            color: var(--text-gold);
            margin-left: -5px; /* Une as duas partes do M */
        }

        .logo-sifrao {
            font-size: 2.5rem; /* Metade do tamanho, igual na logo */
            color: #12222e;    /* Mesma cor escura do início do M */
            font-family: -apple-system, sans-serif;
            font-weight: bold;
            margin-top: -0.4rem; /* Faz ele flutuar no topo */
            margin-left: 2px;
        }

        .brand-title {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #12222e; /* Mantendo o padrão escuro da assinatura */
            margin: 0;
            text-transform: uppercase;
            background: none;
            -webkit-text-fill-color: initial;
        }

        /* Se preferir que o nome MAXSUEL continue branco para destacar no fundo escuro: */
        .brand-title-dark-mode {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-white);
            margin: 0;
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 8px;
            color: var(--text-gold);
            text-transform: uppercase;
            margin-top: 0.4rem;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.4rem 0;
            display: inline-block;
        }

        .professional-title {
            font-size: 1.1rem;
            color: var(--text-white);
            opacity: 0.8;
            margin-top: 1.5rem;
            font-weight: 500;
        }

        /* O restante dos estilos permanecem iguais... */
        .bio-card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 3rem;
        }
        .bio-card strong { color: var(--text-gold); }
        h2 { font-size: 1.35rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5em; margin-top: 3rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; text-transform: uppercase; letter-spacing: 1px;}
        h2 i { color: var(--text-gold); }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; margin-bottom: 2.5rem; }
        .btn-tech { display: flex; align-items: center; justify-content: flex-start; gap: 1rem; background-color: var(--bg-card); color: var(--text-white); text-decoration: none; padding: 1.1rem 1.5rem; border-radius: 10px; font-weight: 600; transition: all 0.3s ease; border: 1px solid var(--border-color); }
        .btn-tech:hover { background-color: var(--btn-hover); border-color: var(--text-gold); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(195, 166, 125, 0.15); }
        .btn-tech i { font-size: 1.3rem; color: var(--text-gold); }
        .tech-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; padding: 0; list-style: none; }
        .tag { background: rgba(20, 30, 51, 0.6); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 30px; font-size: 0.9rem; color: var(--text-white); font-weight: 500; }
        .tag-group-title { font-size: 1rem; color: #94a3b8; margin-top: 1.5rem; margin-bottom: 0.75rem; font-weight: 700; text-transform: uppercase; }
        footer { text-align: center; margin-top: 5rem; color: #64748b; font-size: 0.85rem; border-top: 1px solid var(--border-color); padding-top: 2rem; }
    </style>
</head>
<body>

    <!-- Header Corrigido Proporcional à Logo Real -->
    <div class="brand-header">
        <div class="brand-logo-container">
            <span class="logo-m-left">M</span><span class="logo-m-right">ı</span><span class="logo-sifrao">$</span>
        </div>
        <h1 class="brand-title-dark-mode">MAXSUEL</h1>
        <div class="brand-subtitle">CONTABILIDADE</div>
        <div class="professional-title">Maxsuel Ribeiro | Contador &amp; Analista de Dados Fiscais</div>
    </div>
